<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Tailwind and daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <section class="flex items-center justify-center h-screen">
        <fieldset class="fieldset bg-white border-base-300 rounded-box w-xs border p-4">
            <div class="text-center mb-5">
                <h1 class=" w-[100px] mx-auto mb-4"><img src="./assets/github-logo.png" alt=""></h1>
                <p>Sign in to manage your issues</p>
            </div>
            <label class="label">Username</label>
            <input type="text" class="input" placeholder="Enter Username" />
            <span class="mb-4 block text-muted">Default: admin</span>
            <label class="label">Password</label>
            <input type="password" class="input" placeholder="Enter Password" />
            <span class="mb-4 block text-muted">Default: admin123</span>
            <button class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
    </section>





    <!-- JS Files -->
    <script src="./script.js"></script>
</body>

</html>
