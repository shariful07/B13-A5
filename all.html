<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Tailwind and daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm justify-between px-20 mb-14">
            <div class="flex">
                <span class="w-[36px] h-[36px] block"><img class="w-full" src="./assets/github-logo.png" alt=""></span>
                <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <button class="btn btn-primary">+ New Issue</button>
            </div>
        </div>
    </header>

    <main class="container lg:max-w-[1150px] mx-auto px-5">
        <div class="bg-white flex shadow-sm p-6 gap-2 mb-4 rounded-box">

            <button id="all-tab" class="tab-btn btn btn-primary" onclick="filterIssue('all-tab')">All</button>
            <button id="open-tab" class="tab-btn btn btn-outline" onclick="filterIssue('open-tab')">Open</button>
            <button id="closed-tab" class="tab-btn btn btn-outline" onclick="filterIssue('closed-tab')">Closed</button>

        </div>
        <div class="bg-[#FBFBFB] shadow-sm gap-2 mb-4 rounded-box">
            <div class="bg-white flex justify-between items-center p-6">
                <div class="flex">
                    <span class="w-[50px] h-[50px] flex items-center justify-center bg-[#ECE4FF] rounded-full mr-2">
                        <img src="./assets/Aperture.png" alt="">
                    </span>
                    <div>
                        <h2 id="issue-count" class="text-lg font-semibold"></h2>
                        <p class="text-sm text-muted">Track and manage your project issues</p>

                    </div>
                </div>
                <ul class="flex gap-4">
                    <li class="flex items-center">
                        <span class="bg-[#00A96E] rounded-full w-3 h-3"></span>
                        <span class="ml-1">Open</span>
                    </li>
                    <li class="flex items-center">
                        <span class="bg-[#FF6B6B] rounded-full w-3 h-3"></span>
                        <span class="ml-1">Closed</span>
                    </li>
                </ul>
            </div>

            <div id="spinner" class="my-4 text-center hidden">Loading...</div>
            <div id="issue-container" class="p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                
            </div>
        </div>
    </main>





    <!-- JS Files -->
    <script src="./script.js"></script>
</body>

</html>
